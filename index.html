<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulador Interactivos del Sistema Solar 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* UI Flotante Elegante */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffaa00, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .btn-toggle {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .btn-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
            background: linear-gradient(135deg, #34495e, #2980b9);
        }
        .btn-toggle:active {
            transform: translateY(1px);
        }
        .scale-info {
            margin-top: 15px;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .scale-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 5px;
            background: #e74c3c;
        }
        .scale-status.visual {
            background: #2ecc71;
        }
        /* Instrucciones para móvil escondidas elegantemente */
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            pointer-events: none;
            text-align: center;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @media (max-width: 480px) {
            #ui-container {
                width: calc(100% - 40px);
                top: 15px;
                left: 15px;
                padding: 15px;
            }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <h1>Sistema Solar 3D</h1>
        <p>Simulación interactiva con físicas de rotación independientes y conmutador de escala métrica.</p>
        <button class="btn-toggle" id="scaleBtn">Cambiar a Escala Real</button>
        <div class="scale-info">
            Modo actual: <span id="scaleStatus" class="scale-status visual">Visual</span>
        </div>
    </div>

    <div class="instructions">
        Arrastrar: Rotar | Pellizcar/Rueda: Zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
                "three/addons/": "https://threejs.org/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuración e Inicialización Básica ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 45, 85);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 2000;
        controls.minDistance = 3;

        // --- Estado de la Simulación ---
        let modoEscalaReal = false; // false = Visual, true = Real (UA)

        // --- Iluminación ---
        const ambientLight = new THREE.AmbientLight(0x333333); // Luz espacial tenue
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 1500, 0.5); // Luz del Sol
        scene.add(sunLight);

        // --- Fondo de Estrellas Procedimental ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starPositions = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i += 3) {
            // Posicionar estrellas en una esfera gigante lejana
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = 900 + Math.random() * 300; 
            
            starPositions[i] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i+2] = r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 1.2, sizeAttenuation: true});
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // --- Generador de Texturas Procedimentales (Canvas) ---
        function createNoiseTexture(type, baseColor, detailColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Generación de patrones simples simulando superficies planetarias
            if (type === 'sun') {
                let gradient = ctx.createRadialGradient(256,128,10, 256,128,256);
                gradient.addColorStop(0, '#fffdf0');
                gradient.addColorStop(0.2, '#ffaa00');
                gradient.addColorStop(1, '#ff3300');
                ctx.fillStyle = gradient;
                ctx.fillRect(0,0,512,256);
            } else if (type === 'stripes') { // Júpiter / Saturno
                for (let i = 0; i < 256; i += 8) {
                    ctx.fillStyle = Math.random() > 0.4 ? baseColor : detailColor;
                    ctx.fillRect(0, i, 512, Math.random() * 12 + 4);
                }
            } else if (type === 'spots') { // Tierra / Marte / Mercurio
                for(let i=0; i<40; i++) {
                    ctx.fillStyle = detailColor;
                    ctx.beginPath();
                    ctx.arc(Math.random()*512, Math.random()*256, Math.random()*40+10, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        // --- Datos de los Cuerpos Celestes ---
        // Escala Real (UA aproximadas para visualización limpia, escaladas proporcionalmente)
        // Escala Visual (Valores arbitrarios para que sea estético en pantalla)
        const planetData = [
            { name: "Mercurio", rVisual: 0.8, rReal: 0.35, distVisual: 12, distReal: 15,  vRot: 0.01,  vOrb: 0.04,  color: "#888888", texType: 'spots', detail: "#555555", retrograde: false },
            { name: "Venus",    rVisual: 1.4, rReal: 0.87, distVisual: 16, distReal: 24,  vRot: -0.002, vOrb: 0.015, color: "#e3bb76", texType: 'stripes', detail: "#b58f46", retrograde: true },
            { name: "Tierra",   rVisual: 1.6, rReal: 0.91, distVisual: 22, distReal: 36,  vRot: 0.02,  vOrb: 0.01,  color: "#2233ff", texType: 'spots', detail: "#22aa33", retrograde: false },
            { name: "Marte",    rVisual: 1.1, rReal: 0.49, distVisual: 28, distReal: 50,  vRot: 0.018, vOrb: 0.008, color: "#c1440e", texType: 'spots', detail: "#731d04", retrograde: false },
            { name: "Júpiter",  rVisual: 3.8, rReal: 2.20, distVisual: 38, distReal: 110, vRot: 0.04,  vOrb: 0.002, color: "#b07f35", texType: 'stripes', detail: "#ffddaa", retrograde: false },
            { name: "Saturno",  rVisual: 3.2, rReal: 1.80, distVisual: 50, distReal: 180, vRot: 0.035, vOrb: 0.0009, color: "#e2bf7d", texType: 'stripes', detail: "#b5945b", retrograde: false, hasRings: true },
            { name: "Urano",    rVisual: 2.2, rReal: 1.20, distVisual: 62, distReal: 280, vRot: -0.03, vOrb: 0.0004, color: "#4b70dd", texType: 'stripes', detail: "#70a0e0", retrograde: true },
            { name: "Neptuno",  rVisual: 2.0, rReal: 1.15, distVisual: 72, distReal: 390, vRot: 0.028, vOrb: 0.0001, color: "#274687", texType: 'spots', detail: "#212e5f", retrograde: false }
        ];

        // --- Crear el Sol ---
        const sunTex = createNoiseTexture('sun');
        const sunGeo = new THREE.SphereGeometry(6, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ map: sunTex }); // Basic para que emita su propia luz visual sin sombras
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sunMesh);

        // --- Crear Planetas, Órbitas y Satélites ---
        const planetObjects = [];
        const orbitLines = [];

        // Función para generar la geometría lineal de una órbita
        function createOrbitLine(radius) {
            const material = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.08, transparent: true });
            const geometry = new THREE.BufferGeometry();
            const points = [];
            for (let i = 0; i <= 128; i++) {
                const theta = (i / 128) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(theta) * radius, 0, Math.sin(theta) * radius));
            }
            geometry.setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            return line;
        }

        planetData.forEach((data) => {
            // Contenedor pivot para la órbita del planeta
            const pivot = new THREE.Group();
            scene.add(pivot);

            // Malla del Planeta
            const geo = new THREE.SphereGeometry(data.rVisual, 32, 32);
            const tex = createNoiseTexture(data.texType, data.color, data.detail);
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex,
                roughness: 0.8,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Posición inicial estándar (Modo Visual)
            mesh.position.x = data.distVisual;
            pivot.add(mesh);

            // Añadir Anillos a Saturno si aplica
            if (data.hasRings) {
                const ringGeo = new THREE.RingGeometry(data.rVisual * 1.4, data.rVisual * 2.3, 64);
                // Ajustar UVs para que el mapa se estire circularmente de manera limpia
                const pos = ringGeo.attributes.position;
                const v3 = new THREE.Vector3();
                for (let i = 0; i < pos.count; i++) {
                    v3.fromBufferAttribute(pos, i);
                    ringGeo.attributes.uv.setXY(i, v3.length() < data.rVisual * 1.8 ? 0 : 1, 1);
                }
                const ringMat = new THREE.MeshStandardMaterial({ 
                    color: data.color, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.6
                });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = Math.PI / 2.2; // Inclinación elegante
                mesh.add(ringMesh);
            }

            // Añadir la Luna a la Tierra
            let moonMesh = null;
            if (data.name === "Tierra") {
                const moonGeo = new THREE.SphereGeometry(0.35, 16, 16);
                const moonMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
                moonMesh = new THREE.Mesh(moonGeo, moonMat);
                moonMesh.position.x = 3; // Distancia a la Tierra
                mesh.add(moonMesh);
            }

            // Crear la línea visual de su órbita actual
            const orbitLine = createOrbitLine(data.distVisual);

            // Guardar referencias para las animaciones y transiciones de escala
            planetObjects.push({
                mesh: mesh,
                pivot: pivot,
                data: data,
                moon: moonMesh,
                moonAngle: 0,
                orbitLine: orbitLine,
                currentDist: data.distVisual,
                targetDist: data.distVisual,
                currentRadius: data.rVisual,
                targetRadius: data.rVisual
            });
        });

        // --- Gestión del Cambio de Escala (Transiciones Fluídas) ---
        const scaleBtn = document.getElementById('scaleBtn');
        const scaleStatus = document.getElementById('scaleStatus');

        scaleBtn.addEventListener('click', () => {
            modoEscalaReal = !modoEscalaReal;

            if (modoEscalaReal) {
                scaleStatus.textContent = "Real (UA)";
                scaleStatus.className = "scale-status real";
                scaleBtn.textContent = "Cambiar a Escala Visual";
                
                // Ajustar objetivos métricos reales
                planetObjects.forEach(obj => {
                    obj.targetDist = obj.data.distReal;
                    obj.targetRadius = obj.data.rReal;
                });
            } else {
                scaleStatus.textContent = "Visual";
                scaleStatus.className = "scale-status visual";
                scaleBtn.textContent = "Cambiar a Escala Real";

                // Ajustar objetivos métricos de diseño visual
                planetObjects.forEach(obj => {
                    obj.targetDist = obj.data.distVisual;
                    obj.targetRadius = obj.data.rVisual;
                });
            }
        });

        // --- Bucle de Animación y Renderizado (60 FPS / RequestAnimationFrame) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Rotación del Sol sobre su eje
            sunMesh.rotation.y += 0.002;

            planetObjects.forEach(obj => {
                // Interpolar de manera fluida (Lerp) distancias y tamaños en los cambios de modo
                obj.currentDist = THREE.MathUtils.lerp(obj.currentDist, obj.targetDist, 0.05);
                obj.currentRadius = THREE.MathUtils.lerp(obj.currentRadius, obj.targetRadius, 0.05);

                // Aplicar posiciones e interpolación de escala a las mallas
                obj.mesh.position.x = obj.currentDist;
                obj.mesh.scale.setScalar(obj.currentRadius / obj.data.rVisual);

                // Re-dibujar/escalar dinámicamente las órbitas según se expanden o contraen
                obj.orbitLine.scale.set(obj.currentDist / obj.data.distVisual, 1, obj.currentDist / obj.data.distVisual);

                // Traslación orbital (Movimiento alrededor del Sol)
                obj.pivot.rotation.y += obj.data.vOrb;

                // Rotación intrínseca (Sobre su propio eje)
                obj.mesh.rotation.y += obj.data.vRot;

                // Rotación de la Luna (si el planeta la posee)
                if (obj.moon) {
                    obj.moonAngle += 0.05;
                    obj.moon.position.x = Math.cos(obj.moonAngle) * (obj.currentRadius + 1.2);
                    obj.moon.position.z = Math.sin(obj.moonAngle) * (obj.currentRadius + 1.2);
                    obj.moon.rotation.y += 0.01;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // --- Adaptabilidad Responsive (Resize del Navegador / Cambios de Orientación) ---
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Ejecutar simulación
        animate();

    </script>
</body>
</html>
